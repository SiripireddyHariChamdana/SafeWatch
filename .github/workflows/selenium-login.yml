name: SafeWatch E2E CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ===================================================================
  # JOB 1: Python API Simulation Test (fast, no browser needed)
  # ===================================================================
  api-simulation:
    name: API Simulation Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libpq-dev python3-dev build-essential

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt

    - name: Create .env Configuration
      run: |
        echo "DATABASE_URL=sqlite:///./test.db" > backend/.env
        echo "SECRET_KEY=ci-pipeline-secure-secret-key-12345"                      >> backend/.env
        echo "TOKEN_EXPIRE_MINUTES=60"                                              >> backend/.env
        echo "ALLOWED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000"          >> backend/.env
        echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}"               >> backend/.env
        echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}"                  >> backend/.env
        echo "TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}"                >> backend/.env
        echo "GMAIL_USER=${{ secrets.GMAIL_USER }}"                                >> backend/.env
        echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}"                >> backend/.env
        # Reconstruct Firebase service account key from GitHub Secret
        if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > backend/ServiceAccountKey.json
          echo "[+] Firebase service account key restored from GitHub Secret."
        else
          echo "[!] FIREBASE_SERVICE_ACCOUNT_JSON not set — FCM notifications disabled in CI."
        fi

    - name: Launch FastAPI Server
      run: python run.py > uvicorn.log 2>&1 &
      env:
        PYTHONUNBUFFERED: "1"
        CI: "true"

    - name: Wait for Backend Health Check
      run: |
        echo "Checking backend health..."
        for i in {1..20}; do
          if curl -sf http://localhost:8000/api/health | grep -q "healthy"; then
            echo "[+] FastAPI Server is healthy!"
            exit 0
          fi
          echo "[-] Attempt $i/20 — waiting 3s..."
          sleep 3
        done
        echo "[!] Server failed to start."
        cat uvicorn.log
        exit 1

    - name: Run API Simulation Tests
      run: python tests/simulate_safewatch.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node.js E2E Dependencies
      run: |
        cd frontend/selenium-tests
        npm install

    - name: Run JS Selenium E2E Tests
      run: |
        cd frontend/selenium-tests
        npm run login

    - name: Upload Server Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: api-simulation-failure-logs
        path: uvicorn.log
        retention-days: 7

  # ===================================================================
  # JOB 2: SafeWatch E2E Test Suite & Excel Report
  # ===================================================================
  e2e-testing:
    name: Run E2E Test Suite and Generate Excel Report
    runs-on: ubuntu-latest
    needs: api-simulation   # only run E2E if API tests pass

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt
        pip install openpyxl selenium Appium-Python-Client

    - name: Run E2E Test Suite (100 Test Cases)
      run: |
        python tests/run_tests.py

    - name: Upload Excel Test Report
      uses: actions/upload-artifact@v4
      with:
        name: safewatch-test-report
        path: safewatch_test_report.xlsx
        retention-days: 7
